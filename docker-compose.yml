services:
  postgres:
    image: postgres:16-alpine
    container_name: stock-agent-postgres
    environment:
      POSTGRES_DB: stock_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stock_agent"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - stock_agent_pgdata:/var/lib/postgresql/data

volumes:
  stock_agent_pgdata:

